name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]
  workflow_call:
  workflow_dispatch:

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python with uv
        uses: ./.github/actions/setup-python-uv
        with:
          enable-cache: "true"

      - name: Run tests
        run: uv run pytest -v --tb=short -n auto
        timeout-minutes: 5
        env:
          DATA_EXTRACTOR_ENABLE_JAVASCRIPT: "false"

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python with uv
        uses: ./.github/actions/setup-python-uv

      - name: Run ruff linting
        run: uv run ruff check extractor/

      - name: Run ruff formatting check
        run: uv run ruff format --check extractor/

      - name: Run mypy type checking
        run: uv run mypy extractor/

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python with uv
        uses: ./.github/actions/setup-python-uv

      - name: Run bandit security scan
        run: |
          uv run bandit -r extractor/ -f json -o bandit-report.json || true
          uv run bandit -r extractor/

      - name: Run pip-audit vulnerability scan
        run: |
          uv run pip-audit --format=json --output=audit-report.json || true
          # 忽略 CVE-2026-4539 (pygments)，暂无修复版本
          uv run pip-audit --ignore-vuln CVE-2026-4539

      - name: Upload security reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            audit-report.json

  build:
    name: Build Package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python with uv
        uses: ./.github/actions/setup-python-uv
        with:
          install-dev: "false"

      - name: Build package
        run: uv build

      - name: Test installation from wheel
        run: |
          uv pip install dist/*.whl
          uv run python -c "import extractor; print(f'Successfully imported extractor v{extractor.__version__}')" || uv run python -c "import extractor; print('Successfully imported extractor')"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-test
          path: dist/
          retention-days: 7

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python with uv
        uses: ./.github/actions/setup-python-uv

      - name: Run tests with coverage
        run: uv run pytest --cov=extractor --cov-report=xml --cov-report=html --cov-report=term -n auto
        timeout-minutes: 5
        env:
          DATA_EXTRACTOR_ENABLE_JAVASCRIPT: "false"

      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
