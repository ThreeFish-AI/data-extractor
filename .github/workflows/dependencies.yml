name: Update Dependencies

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  update:
    name: Update Dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python with uv
        uses: ./.github/actions/setup-python-uv

      - name: Update dependencies
        run: |
          uv lock --upgrade
          if git diff --quiet uv.lock; then
            echo "No dependency updates available"
            echo "has_updates=false" >> $GITHUB_ENV
          else
            echo "Dependency updates found"
            echo "has_updates=true" >> $GITHUB_ENV
          fi

      - name: Test with updated dependencies
        if: env.has_updates == 'true'
        run: uv run pytest -x --tb=short
        env:
          DATA_EXTRACTOR_ENABLE_JAVASCRIPT: "false"

      - name: Create Pull Request
        id: create_pr
        if: env.has_updates == 'true'
        continue-on-error: true
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(deps): update dependencies"
          title: "chore(deps): Update dependencies"
          body: |
            ## Dependency Updates

            This PR updates project dependencies to their latest versions.

            ### Changes
            - Updated `uv.lock` with latest compatible versions
            - All tests pass with updated dependencies

            Auto-generated by GitHub Actions.
          branch: update-dependencies
          delete-branch: true
          labels: |
            dependencies
            automated

      - name: Report PR creation failure
        if: always() && steps.create_pr.outcome == 'failure'
        run: |
          echo "## ⚠️ PR Creation Failed" >> $GITHUB_STEP_SUMMARY
          echo "Dependency updates tested successfully, but PR creation failed." >> $GITHUB_STEP_SUMMARY
          echo "Check [workflow permissions](../../settings/actions) or use a PAT." >> $GITHUB_STEP_SUMMARY
