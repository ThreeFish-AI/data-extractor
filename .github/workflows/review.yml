name: Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  pr-review:
    name: PR Code Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Get PR changed files
        id: changed-files
        env:
          PR_BASE: ${{ github.event.pull_request.base.ref }}
          PR_HEAD: ${{ github.event.pull_request.head.ref }}
        run: |
          git diff --name-only "origin/$PR_BASE...origin/$PR_HEAD" > changed_files.txt
          echo "file_count=$(wc -l < changed_files.txt)" >> "$GITHUB_OUTPUT"

      - name: Run code review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          PR_BASE: ${{ github.event.pull_request.base.ref }}
          PR_HEAD: ${{ github.event.pull_request.head.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "Reviewing PR #$PR_NUMBER"
          bash .github/scripts/review-files.sh \
            changed_files.txt \
            "origin/$PR_BASE" \
            "origin/$PR_HEAD" \
            pr_review.md

      - name: Post review comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let reviewContent = '';
            try {
              reviewContent = fs.readFileSync('pr_review.md', 'utf8');
            } catch (error) {
              console.error('Could not read review file:', error);
              return;
            }

            if (!reviewContent.trim()) {
              console.log('No review content found');
              return;
            }

            const body = "## 🤖 PR Code Review Results\n\n" +
                         reviewContent + "\n\n" +
                         "---\n" +
                         "*This review was generated by Claude Code.*";

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const existing = comments.find(c =>
              c.body.includes('🤖 PR Code Review Results') && c.user.type === 'Bot'
            );

            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body
              });
            }

  push-review:
    name: Push Code Review
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Get changed files
        id: changed-files
        env:
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          if [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            git diff --name-only "$BEFORE_SHA" "$CURRENT_SHA" > changed_files.txt
          else
            git diff --name-only HEAD~1 HEAD > changed_files.txt
          fi
          echo "changed_files=$(cat changed_files.txt | tr '\n' ' ')" >> "$GITHUB_OUTPUT"

      - name: Run code review
        if: steps.changed-files.outputs.changed_files != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          echo "Reviewing push to ${{ github.ref }}"
          bash .github/scripts/review-files.sh \
            changed_files.txt \
            "$BEFORE_SHA" \
            "$CURRENT_SHA" \
            push_review.md

      - name: Post commit comment
        if: always() && steps.changed-files.outputs.changed_files != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const reviewContent = fs.readFileSync('push_review.md', 'utf8');
              if (!reviewContent.trim()) {
                console.log('Review content is empty, skipping comment');
                return;
              }

              const commitSha = context.sha.substring(0, 7);
              const body = "## 🤖 Code Review for Push " + commitSha + "\n\n" +
                           reviewContent + "\n\n" +
                           "---\n" +
                           "*This review was generated by Claude Code.*";

              await github.rest.repos.createCommitComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: context.sha,
                body
              });
            } catch (error) {
              console.error('Error creating commit comment:', error);
            }

      - name: Create issue for critical findings
        if: failure() && steps.changed-files.outputs.changed_files != ''
        uses: actions/github-script@v7
        env:
          CHANGED_FILES: ${{ steps.changed-files.outputs.changed_files }}
        with:
          script: |
            const fs = require('fs');

            let reviewContent = '';
            try {
              reviewContent = fs.readFileSync('push_review.md', 'utf8');
            } catch (error) {
              console.error('Could not read review file:', error);
            }

            const changedFiles = process.env.CHANGED_FILES;

            let body = '## 🚨 Code Review - Critical Issues Detected\n\n';
            body += 'The automated code review detected critical issues in the recent push.\n\n';

            if (changedFiles) {
              body += '### 📁 Changed Files\n\n```\n' + changedFiles + '\n```\n\n';
            }

            if (reviewContent.trim()) {
              body += '### 📋 Review Details\n\n' + reviewContent + '\n\n';
            }

            body += '### 📌 Next Steps\n\n';
            body += '1. Review the critical issues listed above\n';
            body += '2. Address the identified problems\n';
            body += '3. Push the fixes to resolve this issue\n\n';
            body += '[View Workflow Logs](' + context.payload.repository.html_url + '/actions/runs/' + context.runId + ')\n\n';
            body += '---\n*This issue was automatically created by Claude Code.*';

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Code Review - Critical Issues Detected',
              body,
              labels: ['code-review', 'critical']
            });
